version: '3.8'

services:
  dev:
    build: .
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8501:8501"   # Streamlit
      - "8888:8888"   # Jupyter
    volumes:
      - .:/workspace
    command: sleep infinity

  kali:
    image: kalilinux/kali-rolling
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - dev
    command: tail -f /dev/null